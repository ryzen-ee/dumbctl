name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release
        run: cargo build --release

      - name: Update version badge in README
        run: |
          VERSION="${{ github.ref_name }}"
          sed -i "s/version-v[0-9.]*/version-${VERSION:1}/g" README.md

      - name: Commit version badge update
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add README.md
          git commit -m "docs: Update version badge to ${{ github.ref_name }}" || true

      - name: Push version badge update
        run: |
          git push || true

      - name: Create tarball
        run: |
          tar -czvf dumbctl-${{ github.ref_name }}-linux-x64.tar.gz \
            -C target/release dumbctl

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: dumbctl-*.tar.gz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
